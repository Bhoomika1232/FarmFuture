<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Agri-Chain Ledger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --agri-green: #1b4332;
            --agri-gold: #ffb703;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            overflow: hidden;
            background: #ffffff;
        }

        .login-header {
            background-color: var(--agri-green);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .login-header i {
            font-size: 2.5rem;
            color: var(--agri-gold);
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.1);
            border-color: var(--agri-green);
            background-color: #fff;
        }

        .btn-primary {
            background-color: var(--agri-green);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #2d6a4f;
            transform: translateY(-2px);
        }

        .alert {
            border-radius: 12px;
            border: none;
            font-weight: 500;
        }

        .brand-link {
            text-decoration: none;
            color: var(--agri-green);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="text-center mb-4">
                <a href="/" class="brand-link fs-4">
                    <i class="bi bi-intersect me-1"></i> AGRI-CHAIN
                </a>
            </div>

            <div class="card login-card">
                <div class="login-header">
                    <i class="bi bi-shield-lock"></i>
                    <h4 class="fw-bold mb-0">Secure Portal</h4>
                    <p class="small opacity-75 mb-0">Identity Verification Required</p>
                </div>

                <div class="card-body p-4">
                    {% with messages = get_flashed_messages() %}
                      {% if messages %}
                        {% for message in messages %}
                          <div class="alert alert-danger py-2 small text-center mb-3">
                              <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Username (Email)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px;">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0" 
                                       placeholder="Enter your username" style="border-radius: 0 12px 12px 0;" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px;">
                                    <i class="bi bi-key text-muted"></i>
                                </span>
                                <input type="password" name="password" class="form-control border-start-0" 
                                       placeholder="••••••••" style="border-radius: 0 12px 12px 0;" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3 shadow-sm">
                            Authorize & Sign In
                        </button>
                    </form>

                    <div class="text-center mt-2">
                        <p class="small text-muted mb-0">
                            No account? <a href="/register" class="text-success fw-bold text-decoration-none">Register on Chain</a>
                        </p>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4 text-muted small">
                &copy; 2026 Agri-Chain Decentralized Ledger
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
